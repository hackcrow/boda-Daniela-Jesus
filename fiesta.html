<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Fotos Boda Jesus y Daniela</title>

<link rel="stylesheet" href="index.css?v=1">

</head>

<body>

<!-- PORTADA -->
<div class="hero">
  <img src="https://codeno.com.mx/nuestra_boda_corregida.png" alt="Nuestra boda">
</div>

<!-- INPUT -->
<input type="file" id="fileInput" multiple accept="image/*" style="display:none">

<!-- BOTONES -->
<button id="uploadBtn">Comparte tus fotos</button>

<a href="galeria.html" class="btn-galeria">Ir a Galeria</a>

<!-- PROGRESO -->
<div id="progressContainer">
  <div id="progressBar"></div>
</div>

<!-- GALERIA -->
<div id="gallery"></div>

<!-- MODAL -->
<div id="modal" class="modal">
  <span id="closeModal">&times;</span>
  <img id="modalImg">
</div>

<script src="app.js?v=6"></script>

<script>
// 🔥 FIX CLAVE: limpiar estado del modal al cargar la página
window.addEventListener("load", () => {
  const modal = document.getElementById("modal");

  modal.style.display = "none";
  document.body.classList.remove("modal-open");

  const img = document.getElementById("modalImg");
  if (img) img.src = "";
});

// cerrar modal
document.getElementById("closeModal").onclick = () => {
  const modal = document.getElementById("modal");
  const img = document.getElementById("modalImg");

  modal.style.display = "none";
  document.body.classList.remove("modal-open");
  if (img) img.src = "";
};

document.getElementById("modal").onclick = (e) => {
  if (e.target.id === "modal") {
    const modal = document.getElementById("modal");
    const img = document.getElementById("modalImg");

    modal.style.display = "none";
    document.body.classList.remove("modal-open");
    if (img) img.src = "";
  }
};
</script>

</body>
</html>
