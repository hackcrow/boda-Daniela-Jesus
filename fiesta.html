<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Fiesta Rafa 2026 📸</title>
  <script src="https://widget.cloudinary.com/v2.0/global/all.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #0f0f0f, #1a1a2e);
      color: white;
      text-align: center;
    }

    h1 { margin-top: 40px; }

    button {
      margin: 20px;
      padding: 15px 30px;
      border-radius: 30px;
      border: none;
      background: linear-gradient(45deg, #ff00cc, #3333ff);
      color: white;
      font-size: 18px;
      cursor: pointer;
    }

    #gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 10px;
      padding: 20px;
    }

    img {
      width: 100%;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<h1>🔥 Fiesta  2026 📸</h1>
<button onclick="openWidget()">📸 Subir fotos</button>

<div id="gallery"></div>

<script>
const cloudName = "dazidfv1m";
const uploadPreset = "fiesta-mia";
const folder = "bodaDanielaJesus"; // mismo que pusiste en Cloudinary

let loadedImages = new Set();

function openWidget() {
  cloudinary.openUploadWidget({
    cloudName: cloudName,
    uploadPreset: uploadPreset,
    sources: ["local", "camera"],
    multiple: true
  });
}

// 🔥 FEED EN VIVO
async function loadImages() {
  try {
    const res = await fetch(
      `https://res.cloudinary.com/${cloudName}/image/list/${folder}.json`
    );

    const data = await res.json();

    data.resources.forEach(img => {
      if (!loadedImages.has(img.public_id)) {
        loadedImages.add(img.public_id);

        const image = document.createElement("img");
        image.src = `https://res.cloudinary.com/${cloudName}/image/upload/${img.public_id}.jpg`;

        document.getElementById("gallery").prepend(image);
      }
    });

  } catch (err) {
    console.log("Error cargando imágenes", err);
  }
}

// refresca cada 5 segundos
setInterval(loadImages, 5000);

// carga inicial
loadImages();
</script>

</body>
</html>
