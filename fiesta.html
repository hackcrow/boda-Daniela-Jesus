<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Fiesta  2026 2📸</title>
  <script src="https://widget.cloudinary.com/v2.0/global/all.js"></script>
  
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #0f0f0f, #1a1a2e);
      color: white;
      text-align: center;
    }

    h1 { margin-top: 40px; }

    button {
      margin: 20px;
      padding: 15px 30px;
      border-radius: 30px;
      border: none;
      background: linear-gradient(45deg, #ff00cc, #3333ff);
      color: white;
      font-size: 18px;
      cursor: pointer;
    }

    #gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 10px;
      padding: 20px;
    }

    img {
      width: 100%;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<h1>🔥 Fiesta  2026 📸</h1>
<button onclick="openWidget()">📸 Subir fotos</button>

<div id="gallery"></div>

<script src="app.js"></script>
  
</body>
</html>
