<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Fotos Boda 📸</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./index.css?v=2"> <!-- 🔥 subí versión -->

</head>

<body>

<div class="top-section">

  <div class="hero">
    <img src="https://codeno.com.mx/nuestra_boda_corregida.png">
  </div>

  <div class="btn-wrapper">
    <button id="uploadBtn" class="btn">Comparte tus fotos</button>
  </div>

  <!-- 🔥 NUEVO: texto guía -->
  <p style="font-size:14px; opacity:0.7; text-align:center; margin-top:-10px;">
    Puedes subir varias fotos al mismo tiempo 📸
  </p>

  <div class="btn-wrapper">
    <a href="galeria.html?v=2" class="btn">Ir a Galería</a>
  </div>

</div>

<input type="file" id="fileInput" multiple accept="image/*" hidden>

<div id="gallery"></div>

<!-- 🔥 MODAL -->
<div id="modal">
  <span id="closeModal">&times;</span> <!-- 🔥 mejor símbolo -->
  <img id="modalImg">
</div>

<!-- 🔥 PANEL DE SUBIDA -->
<div id="uploadStatus">
  <p id="uploadText">Subiendo...</p>
  <div id="uploadList"></div>
</div>

<script src="./app.js?v=2"></script> <!-- 🔥 importante para cache -->

</body>
</html>
