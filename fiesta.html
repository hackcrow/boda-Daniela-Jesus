<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Fotos Boda Jesus y Daniela 📸</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #f1f1f1, #e0e4d7, #d6dcc5);
  color: #333;
  text-align: center;
}

h1 {
  color: #2f3e2f;
}

button {
  margin: 10px;
  padding: 14px 25px;
  border-radius: 30px;
  border: none;
  background: linear-gradient(45deg, #6c6e59, #4CAF50);
  color: white;
  font-size: 16px;
  cursor: pointer;
}

#preview {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
}

#gallery {
  column-count: 2;
  column-gap: 8px;
  padding: 10px;
}

@media (min-width: 600px) {
  #gallery { column-count: 3; }
}

@media (min-width: 900px) {
  #gallery { column-count: 5; }
}

#gallery img {
  width: 100%;
  margin-bottom: 8px;
  border-radius: 12px;
  break-inside: avoid;
  cursor: pointer;
}

/* 🔥 MODAL */
.modal {
  display: none;
  position: fixed;
  z-index: 9999;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.9);
  justify-content: center;
  align-items: center;
}

.modal img {
  max-width: 95%;
  max-height: 90%;
  border-radius: 12px;
}

#closeModal {
  position: absolute;
  top: 20px;
  right: 30px;
  font-size: 35px;
  color: white;
  cursor: pointer;
}
</style>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>

<body>

<h1>Fotos Boda Jesus y Daniela 📸</h1>

<input type="file" id="fileInput" multiple accept="image/*" style="display:none">
<button id="uploadBtn">📸 Comparte tus fotos 🤗</button>

<div id="preview"></div>
<div id="gallery"></div>

<!-- 🔥 MODAL -->
  
<div id="modal" class="modal">
  <span id="closeModal">&times;</span>
  <img id="modalImg">
</div>

<script src="app.js"></script>

</body>
</html>
