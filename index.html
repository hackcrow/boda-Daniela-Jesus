<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Daniela & Jesus</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="./index.css?v=300">

<link rel="icon" href="./favicon.ico?v=3">
</head>

<body>

<div class="top-section">

  <div class="hero">
    <img src="https://codeno.com.mx/nuestra_boda_corregida.png">
  </div>

  <div class="btn-wrapper">
    <button id="uploadBtn" class="btn btn-main">
      Subir fotos o videos
    </button>
  </div>

  <p class="upload-hint">
    Puedes subir varias fotos o videos al mismo tiempo 🎉
  </p>

  <div class="btn-wrapper">
    <a href="galeria.html?v=20" class="btn btn-secondary">
      Ir a Galería
    </a>
  </div>

</div>

<input 
  type="file" 
  id="fileInput" 
  multiple 
  accept="image/*,video/*"
  capture="environment"
  hidden
>

<div id="gallery"></div>

<!-- MODAL -->
<div id="modal">
  <span id="closeModal">✕</span>
  <div id="modalContent"></div>
</div>

<!-- STATUS -->
<div id="uploadStatus">
  <p id="uploadText">Subiendo...</p>
  <div id="uploadList"></div>
</div>

<script src="./app.js?v=300"></script>

</body>
</html>
