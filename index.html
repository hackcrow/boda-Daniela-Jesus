<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cuenta regresiva 💍</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #fdfef5;
  text-align: center;
  transition: opacity 0.5s ease;
}

.container {
  margin-top: 40px;
}

.main-photo {
  width: 90%;
  max-width: 400px;
  border-radius: 20px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.2);
  margin-bottom: 25px;
}

#countdown {
  display: flex;
  justify-content: center;
  gap: 12px;
}

.time-box {
  background: white;
  padding: 15px;
  border-radius: 15px;
  min-width: 70px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

.time-box span {
  font-size: 28px;
  font-weight: 600;
  color: #6b705c;
}

.time-box p {
  margin: 0;
  font-size: 12px;
  color: #888;
}

.flip {
  animation: pop 0.3s ease;
}

@keyframes pop {
  0% { transform: scale(1); }
  50% { transform: scale(1.25); }
  100% { transform: scale(1); }
}
</style>

</head>

<body>

<div class="container">

  <!-- 📸 IMAGEN -->
  <img src="https://codeno.com.mx/nuestra_boda_corregida.png" class="main-photo">

  <!-- ⏳ CONTADOR -->
  <div id="countdown">

    <div class="time-box">
      <span id="hours">00</span>
      <p>Horas</p>
    </div>

    <div class="time-box">
      <span id="minutes">00</span>
      <p>Min</p>
    </div>

    <div class="time-box">
      <span id="seconds">00</span>
      <p>Seg</p>
    </div>

  </div>

</div>

<script>

// 🔥 FECHA EXACTA (Mexicali - PDT UTC-7)
const eventDate = new Date("2026-04-18T14:30:00-07:00").getTime();

// 🔥 REDIRECCIÓN INMEDIATA (al abrir la página)
const nowInitial = new Date().getTime();
if (nowInitial >= eventDate) {
  window.location.href = "./fiesta.html";
}

// ================= CONTADOR =================

let lastValues = {};

function updateCountdown() {
  const now = new Date().getTime();
  const diff = eventDate - now;

  // 🔥 REDIRECCIÓN SIEMPRE después de la hora
  if (diff <= 0) {
    window.location.href = "./fiesta.html";
    return;
  }

  const totalSeconds = Math.floor(diff / 1000);

  const values = {
    hours: Math.floor(totalSeconds / 3600),
    minutes: Math.floor((totalSeconds % 3600) / 60),
    seconds: totalSeconds % 60
  };

  for (let key in values) {
    const el = document.getElementById(key);

    if (lastValues[key] !== values[key]) {
      el.classList.add("flip");
      setTimeout(() => el.classList.remove("flip"), 300);
    }

    el.innerText = String(values[key]).padStart(2, "0");
  }

  lastValues = values;
}

// 🔁 actualizar cada segundo
setInterval(updateCountdown, 1000);
updateCountdown();

</script>

</body>
</html>
