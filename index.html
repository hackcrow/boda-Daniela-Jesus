<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Fiesta 2026 📸</title>

<script src="https://widget.cloudinary.com/v2.0/global/all.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #0f0f0f, #1a1a2e);
  color: white;
  text-align: center;
}

.container {
  padding: 20px;
}

h1 {
  font-size: 28px;
  margin-top: 20px;
}

button {
  margin: 10px;
  padding: 14px 25px;
  border-radius: 30px;
  border: none;
  background: linear-gradient(45deg, #ff00cc, #3333ff);
  color: white;
  font-size: 16px;
  cursor: pointer;
}

#gallery {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
  padding: 10px;
}

@media (min-width: 600px) {
  #gallery { grid-template-columns: repeat(3, 1fr); }
}

@media (min-width: 900px) {
  #gallery { grid-template-columns: repeat(5, 1fr); }
}

img {
  width: 100%;
  border-radius: 12px;
  transition: 0.3s;
}

img:hover {
  transform: scale(1.05);
  box-shadow: 0 0 20px #ff00cc;
}

.btn-clear {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: red;
  padding: 10px;
  border-radius: 10px;
}
</style>
</head>

<body>

<div class="container">
  <h1>🔥 Fiesta 2026 📸</h1>

  <button id="uploadBtn">📸 Subir fotos</button>
  <button onclick="clearGallery()" class="btn-clear">🗑️</button>
</div>

<div id="gallery"></div>

<script src="app.js"></script>

</body>
</html>
