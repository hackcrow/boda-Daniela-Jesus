<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Fotos Boda Jesus y Daniela 📸</title>

<script src="https://widget.cloudinary.com/v2.0/global/all.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #f1f1f1, #e0e4d7, #d6dcc5);
  color: #333;
  text-align: center;
}

.container {
  padding: 20px;
}

h1 {
  font-size: 28px;
  margin-top: 20px;
}

button {
  margin: 10px;
  padding: 14px 25px;
  border-radius: 30px;
  border: none;
  background: linear-gradient(45deg, #6c6e59, #4CAF50);
  color: white;
  font-size: 16px;
  cursor: pointer;
  transition: all 0.3s ease;
}

button:hover {
  transform: scale(1.05);
  box-shadow: 0 0 15px #4CAF50;
}

#gallery {
  column-count: 2;
  column-gap: 8px;
  padding: 10px;
}

@media (min-width: 600px) {
  #gallery { column-count: 3; }
}

@media (min-width: 900px) {
  #gallery { column-count: 5; }
}

#gallery img {
  width: 100%;
  margin-bottom: 8px;
  border-radius: 12px;
  break-inside: avoid;
}

@media (min-width: 600px) {
  #gallery { grid-template-columns: repeat(3, 1fr); }
}

@media (min-width: 900px) {
  #gallery { grid-template-columns: repeat(5, 1fr); }
}

img {
  width: 100%;
  border-radius: 12px;
  transition: 0.3s;
}

img:hover {
  transform: scale(1.05);
  box-shadow: 0 0 20px #ff00cc;
}

.btn-clear {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: red;
  padding: 10px;
  border-radius: 10px;
}

#preview {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  padding: 10px;
}

img {
  width: 100%;
  border-radius: 12px;
  transition: all 0.4s ease;
}
</style>
</head>

<body>

<div class="container">
  <h1>Fotos Boda Jesus y Daniela 📸</h1>

  <input type="file" id="fileInput" multiple accept="image/*" style="display:none">

  <button id="uploadBtn">📸 Comparte tus fotos 🤗</button>
</div>
<div id="preview" style="display:flex;flex-wrap:wrap;justify-content:center;"></div>
<div id="gallery"></div>

<script src="app.js"></script>

</body>
</html>
