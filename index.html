<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Fiesta 2026 📸</title>

<script src="https://widget.cloudinary.com/v2.0/global/all.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #0f0f0f, #1a1a2e);
  color: white;
  text-align: center;
}

/* 🔥 CONTENEDOR */
.container {
  padding: 20px;
}

/* 🔥 TITULO */
h1 {
  font-size: 28px;
  margin-top: 20px;
}

/* 🔥 BOTONES */
button {
  margin: 10px;
  padding: 14px 25px;
  border-radius: 30px;
  border: none;
  background: linear-gradient(45deg, #ff00cc, #3333ff);
  color: white;
  font-size: 16px;
  cursor: pointer;
}

/* 🔥 GALERIA RESPONSIVE */
#gallery {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
  padding: 10px;
}

/* Tablet */
@media (min-width: 600px) {
  #gallery {
    grid-template-columns: repeat(3, 1fr);
  }
}

/* Desktop */
@media (min-width: 900px) {
  #gallery {
    grid-template-columns: repeat(5, 1fr);
  }
}

img {
  width: 100%;
  border-radius: 10px;
  animation: fadeIn 0.5s ease;
}

/* Animación */
@keyframes fadeIn {
  from {opacity: 0; transform: scale(0.9);}
  to {opacity: 1; transform: scale(1);}
}

img {
  width: 100%;
  border-radius: 12px;
  transition: all 0.3s ease;
}

img:hover {
  transform: scale(1.05);
  box-shadow: 0 0 20px #ff00cc;
}

.btn-clear {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #ff3b3b;
  color: white;
  border: none;
  padding: 12px 16px;
  border-radius: 10px;
  font-size: 14px;
  cursor: pointer;
  z-index: 999;
}

.btn-clear:hover {
  background: #ff0000;
}

</style>
</head>

<body>

<div class="container">
  <h1>🔥 Fiesta 2026 !📸</h1>

  <button onclick="openWidget()">📸 Subir fotos</button>
 <!-- <button onclick="loadImages()">🔄 Recargar fotos</button>-->
  <button onclick="clearGallery()" class="btn-clear">🗑️ Limpiar fotos</button>
</div>

<div id="gallery"></div>

<script src="app.js"></script>

</body>
</html>
